<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Import Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(244,63,94,0.16),_transparent_25%),radial-gradient(circle_at_bottom_right,_rgba(59,130,246,0.14),_transparent_32%)]"></div>

    <main class="relative mx-auto flex min-h-screen max-w-3xl items-center justify-center px-6 py-12">
        <div class="w-full rounded-3xl border border-white/10 bg-slate-900/80 p-10 text-center shadow-2xl shadow-slate-950/40 backdrop-blur-xl">
            <p class="text-sm uppercase tracking-[0.24em] text-rose-300">Missing Import</p>
            <h1 class="mt-3 text-4xl font-semibold text-white">We couldn’t find that import.</h1>
            <p class="mt-4 text-slate-300">
                No import job exists for <span class="font-mono text-slate-100">{{ job_id }}</span>.
            </p>
            <a href="/" class="mt-8 inline-flex items-center rounded-2xl bg-white px-5 py-3 text-sm font-semibold text-slate-950 hover:bg-slate-100">
                Return Home
            </a>
        </div>
    </main>
</body>
</html>
