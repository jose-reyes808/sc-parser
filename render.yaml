services:
  - type: web
    name: soundcloud-parser
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webapp:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: WEBAPP_SESSION_SECRET
        generateValue: true
      - key: SOUNDCLOUD_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        sync: false
      - key: WEBAPP_SPOTIFY_REDIRECT_URI
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: soundcloud-parser-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: soundcloud-parser-redis
          property: connectionString

  - type: worker
    name: soundcloud-parser-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: WEBAPP_SESSION_SECRET
        sync: false
      - key: SOUNDCLOUD_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        sync: false
      - key: WEBAPP_SPOTIFY_REDIRECT_URI
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: soundcloud-parser-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: soundcloud-parser-redis
          property: connectionString

  - type: redis
    name: soundcloud-parser-redis
    plan: starter
    ipAllowList: []

databases:
  - name: soundcloud-parser-db
    plan: starter
